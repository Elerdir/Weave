name: ci

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  # sqlx používá offline cache (.sqlx/) — build nepotřebuje živou DB
  SQLX_OFFLINE: "true"

jobs:
  rust-test:
    name: rust-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Install system deps (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libsecret-1-dev \
            pkg-config

      # generate_context! embeduje frontend z ../dist; pro unit testy stačí placeholder
      # (skutečný frontend se buildí v e2e jobu). Rust testy nezávisí na node.
      - name: Placeholder frontend dist
        run: mkdir -p dist && echo '<!doctype html><title>Weave</title>' > dist/index.html

      - name: Check formatting
        run: cargo fmt --all -- --check

      # Bez --all-features: GPU inference featury (llm-cuda/llm-metal/llm-vulkan)
      # vyžadují CUDA/Metal/Vulkan toolchain, který CI runner nemá — testují se
      # a buildí ručně (viz README, run-dev.bat), ne v CI.
      - name: Clippy
        run: cargo clippy --all-targets --workspace -- -D warnings

      - name: Tests
        run: cargo test --all

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov

      - name: Coverage
        run: cargo llvm-cov --all --lcov --output-path lcov.info

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: lcov.info
          fail_ci_if_error: false

  # Kompiluje a testuje macOS cestu (cfg(target_os = "macos")), kterou ubuntu
  # job nikdy nevidí, + ověří, že se llama.cpp s Metal backendem zkompiluje.
  # Repo je public → macOS runnery jsou zdarma.
  rust-macos:
    name: rust-macos
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Placeholder frontend dist
        run: mkdir -p dist && echo '<!doctype html><title>Weave</title>' > dist/index.html

      - name: Clippy (macOS)
        run: cargo clippy --all-targets --workspace -- -D warnings

      - name: Tests (macOS)
        run: cargo test --all

      # Metal build llama.cpp (cmake + clang jsou na runneru předinstalované).
      - name: Check Metal build
        run: cargo check -p weave-infrastructure --features llm-metal

  frontend-test:
    name: frontend-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install

      - name: Run Vitest
        run: pnpm test

  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install

      - name: TypeScript check
        run: pnpm typecheck

  storybook:
    name: storybook
    runs-on: ubuntu-latest
    env:
      STORYBOOK_DISABLE_TELEMETRY: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install

      - name: Build Storybook
        run: pnpm build-storybook

  e2e:
    name: e2e
    runs-on: ubuntu-latest
    needs: [rust-test, frontend-test, typecheck]
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install deps
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      # Playwright si přes webServer sám spustí `vite build && vite preview`.
      # Testy ověřují webové UI (Tauri nativní vrstva se testuje ručně / později WebDriverem).
      - name: Run Playwright E2E
        run: pnpm playwright
        env:
          CI: true

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
